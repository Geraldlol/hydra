name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22.22.1
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Package VSIX
        if: runner.os == 'Linux' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: pnpm run package

      - name: Audit dependencies
        if: runner.os == 'Linux'
        run: pnpm audit --audit-level=high

  extension-host:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22.22.1
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run extension-host tests (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run -a pnpm run test:integration

      - name: Run extension-host tests (Windows)
        if: runner.os == 'Windows'
        run: pnpm run test:integration
